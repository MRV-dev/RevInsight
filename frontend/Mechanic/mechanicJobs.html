<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs - MMPS</title>
    <link rel="stylesheet" href="css/mechanicJobs.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🔧</div>
            </div>  
            
            <nav class="sidebar-nav">
                <a href="mechanicDashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="mechanicJobs.html" class="nav-item active">
                    <span class="nav-icon">🔨</span>
                    <span class="nav-label">Jobs</span>
                </a>
                <a href="partsLookup.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Parts</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">Profile</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-title">
                    <span class="section-label">MECHANIC PORTAL</span>
                    <h1>Jobs</h1>
                </div>
                <div class="header-info">
                    <span id="jobCount" class="job-count">0 available services - 0 scheduled</span>
                </div>
            </header>
            
            <!-- Jobs Content -->
            <div class="jobs-content">
                <!-- Tabs -->
                <div class="jobs-tabs">
                    <button class="tab-btn active" data-tab="available">
                        <span class="tab-icon">📋</span>
                        Available Jobs
                    </button>
                    <button class="tab-btn" data-tab="assigned">
                        <span class="tab-icon">📌</span>
                        My Jobs
                        <span class="tab-badge" id="myJobsCount">0</span>
                    </button>
                </div>
                
                <!-- Available Jobs Tab -->
                <div id="available" class="tab-content active">
                    <div class="filter-section">
                        <input type="search" id="availableSearch" placeholder="Search parts by name or item ID..." class="search-input">
                        <select id="availableSort" class="sort-select">
                            <option value="name">Sort: Name</option>
                            <option value="date">Sort: Date</option>
                            <option value="priority">Sort: Priority</option>
                        </select>
                    </div>
                    
                    <div id="availableJobsContainer" class="jobs-list">
                        <!-- Available jobs will be loaded here -->
                    </div>
                </div>
                
                <!-- My Jobs Tab -->
                <div id="assigned" class="tab-content">
                    <div class="filter-section">
                        <input type="search" id="myJobsSearch" placeholder="Search your jobs..." class="search-input">
                        <select id="myJobsFilter" class="sort-select">
                            <option value="all">All</option>
                            <option value="scheduled">Scheduled</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    
                    <div id="myJobsContainer" class="jobs-list">
                        <!-- My jobs will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/mechanicJobs.js"></script>
</body>
</html>
