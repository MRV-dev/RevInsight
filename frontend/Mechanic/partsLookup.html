<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parts Lookup - MMPS</title>
    <link rel="stylesheet" href="css/partsLookup.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🔧</div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="mechanicDashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="mechanicJobs.html" class="nav-item">
                    <span class="nav-icon">🔨</span>
                    <span class="nav-label">Jobs</span>
                </a>
                <a href="partsLookup.html" class="nav-item active">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Parts</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">Profile</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-title">
                    <span class="section-label">MECHANIC PORTAL</span>
                    <h1>Parts Lookup</h1>
                </div>
                <div class="header-info">
                    <p class="header-subtitle">Read-only inventory reference for mechanics</p>
                </div>
            </header>
            
            <!-- Parts Content -->
            <div class="parts-content">
                <!-- Inventory Stats -->
                <div class="inventory-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="availableCount">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="lowStockCount">0</div>
                        <div class="stat-label">Low Stock</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="outOfStockCount">0</div>
                        <div class="stat-label">Out of Stock</div>
                    </div>
                </div>
                
                <!-- Filters and Search -->
                <div class="filter-section">
                    <div class="search-box">
                        <input type="search" id="partsSearch" placeholder="Search parts by name or item ID..." class="search-input">
                        <span class="search-icon">🔍</span>
                    </div>
                    
                    <select id="sortSelect" class="sort-select">
                        <option value="name">Sort: Name</option>
                        <option value="stock">Sort: Stock</option>
                        <option value="category">Sort: Category</option>
                    </select>
                </div>
                
                <!-- Category Tabs -->
                <div class="category-tabs">
                    <button class="category-tab active" data-category="all">All</button>
                    <button class="category-tab" data-category="engine">Engine Parts</button>
                    <button class="category-tab" data-category="brake">Brake Parts</button>
                    <button class="category-tab" data-category="accessories">Accessories</button>
                </div>
                
                <!-- Parts Table -->
                <div class="table-container">
                    <table class="parts-table">
                        <thead>
                            <tr>
                                <th>ITEM ID</th>
                                <th>IMAGE</th>
                                <th>PART NAME</th>
                                <th>CATEGORY</th>
                                <th>PRICE</th>
                                <th>QUANTITY</th>
                            </tr>
                        </thead>
                        <tbody id="partsTableBody">
                            <!-- Parts will be loaded here -->
                        </tbody>
                    </table>
                </div>
                
                <!-- No Results -->
                <div id="noResults" class="no-results" style="display: none;">
                    <div class="no-results-icon">📭</div>
                    <h3>No parts found</h3>
                    <p>Try adjusting your search or filters</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/partsLookup.js"></script>
</body>
</html>
