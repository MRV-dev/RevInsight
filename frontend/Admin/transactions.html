<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Admin</title>
    <link rel="stylesheet" href="css/adminDashboard.css">
</head>
<body data-page="transactions">
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo"><div class="logo-circle">M</div></div>
            <nav class="nav-menu">
                <a href="adminDashboard.html" class="nav-item">📊</a>
                <a href="revenue.html" class="nav-item">📈</a>
                <a href="transactions.html" class="nav-item active">📋</a>
                <a href="inventory.html" class="nav-item">📦</a>
                <a href="mechanics.html" class="nav-item">🔧</a>
                <a href="adminLogin.html" class="nav-item logout" title="Logout">🚪</a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="admin-header">
                <div class="header-brand">
                    <h1>TRANSACTIONS</h1>
                    <p>Mancy's Motorcycle Parts, Accessories & Services</p>
                </div>
                <div class="header-right">
                    <div class="timestamp" id="timestamp">06/22/2026 06:33 PM</div>
                    <div class="notification-icon">🔔</div>
                </div>
            </header>
            <section class="section-content active">
                <div class="transactions-container">
                    <div class="transactions-header">
                        <button class="btn-primary">View Revenue</button>
                        <div class="transactions-info">Total: <span id="transactionTotal">₱5,500</span></div>
                    </div>
                    <div class="search-filter">
                        <input type="text" placeholder="Search by customer, item, mechanic...">
                        <select id="filterDropdown">
                            <option>All</option>
                            <option>Paid</option>
                            <option>Pending</option>
                            <option>Cancelled</option>
                        </select>
                    </div>
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>ITEM ID</th>
                                <th>PURCHASE DATE</th>
                                <th>CUSTOMER NAME</th>
                                <th>ITEMS</th>
                                <th>TOTAL AMOUNT</th>
                                <th>STATUS</th>
                                <th>MECHANIC</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="js/adminDashboard.js"></script>
</body>
</html>
