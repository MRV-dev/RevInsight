<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <h1>MMPS</h1>
      <p>SHOP</p>
    </div>
    
    <div class="tagline">
      <h1>Manoy's Motorcycle <span>Parts & Accessories</span></h1>
      <p>Browse and order genuine motorcycle parts and <span>accessories. Fast, reliable, and trusted by riders.</span></p>
    </div>

  </header>

  <main>
    <div class="auth-btn">
      <button class="auth-button active">Sign in</button>
      <button class="auth-button">Register</button>
    </div>

    <section class="login-form sign-in-form">
      <h2>Welcome back!</h2>
      <p>Sign in to your customer account</p>
      <form>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="Login-btn">Sign In</button>
      </form>
    </section>
    
    <section class="login-form register-form">
      <h2>Create Account</h2>
      <p>Join MMPS and start shopping</p>
      <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Juan dela Cruz" required>

        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" placeholder="you@email.com" required>

        <label for="phone">Phone Number <span>(optional)</span></label>
        <input type="tel" id="phone" name="phone" placeholder="09XXXXXXXXX">

        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="Min. 6 characters" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat password" required>

        <button type="submit" class="Login-btn">Create Account</button>
      </form>
    </section>
  </main>
  






  <script src="./script/interactive.js"></script>
</body>
</html>
